<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid d-flex align-items-center gap-3">
    
    <!-- Title -->
    <h3 class="text-white mb-0">Student Management System</h3>

    <!-- Link beside title -->
    <ul class="navbar-nav d-flex flex-row">
      <li class="nav-item">
        <a class="nav-link text-white" th:href="@{/students}">
          Student Management
        </a>
      </li>
    </ul>

  </div>
</nav>


<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card p-4 shadow">
                <h3 class="text-center mb-4">Update Student Info</h3>

               <form th:action="@{/students/edit/{id}(id=${student.id})}" th:object="${student}" method="post">

    <!-- First Name -->
    <div class="mb-3">
        <label class="form-label">First Name</label>
        <input type="text" th:field="*{firstName}" class="form-control" placeholder="Enter first name">
    </div>

    <!-- Last Name -->
    <div class="mb-3">
        <label class="form-label">Last Name</label>
        <input type="text" th:field="*{lastName}" class="form-control" placeholder="Enter last name">
    </div>

    <!-- Email -->
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" th:field="*{email}" class="form-control" placeholder="Enter email">
    </div>

    <div class="d-grid">
        <button type="submit" class="btn btn-primary">Submit</button>
    </div>

</form>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
