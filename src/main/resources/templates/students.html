<!DOCTYPE html>
<html xmlns:th="http:www.thyemleaf.org">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
<head>
<meta charset="UTF-8">
<title>Student Managment System</title>
</head>
<body>
	<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid d-flex align-items-center gap-3">
    
    <!-- Title -->
    <h3 class="text-white mb-0">Student Management System</h3>

    <!-- Link beside title -->
    <ul class="navbar-nav d-flex flex-row">
      <li class="nav-item">
        <a class="nav-link text-white" th:href="@{/students}">
          Student Management
        </a>
      </li>
    </ul>

  </div>
</nav>

<div class="container">
<div class=text-center>
	<h2 class = text-center>Student List</h2>
</div>
<div class="row">
	<div class="col-lg-3">
	<a th:href="@{students/new}" class="btn btn-primary btn-sm mb-3">Add Student</a>
	</div>
</div>
	<table class = "table table-striped table-bordered">
	<thead class="table-dark">
	<tr>
		<th>First_Name</th>
		<th>Last_Name</th>
		<th>Email</th>
		<th>Actions</th>
	</tr>
	</thead>
	<tbody>
	<tr th:each="student:${students}">
		<td th:text="${student.firstName}"></td>
		<td th:text="${student.lastName}"></td>
		<td th:text="${student.email}"></td>
		<td><a th:href="@{students/edit/{id}(id = ${student.id})}" class="btn btn-info">Update</a>
		<a th:href="@{students/{id}(id = ${student.id})}" class="btn btn-danger">Delete</a></td>
	
	</tr>
	</tbody>
	</table>
</div>
</body>
</html>
